<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <script src="main.js" defer></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <title>CC NYC Poster - 0303</title>
</head>

<body>
  <main class="wrap">
    <div class="device-wrap">
      <div class="screen" id="screen">
        <div class="hud">
          <div class="hud-row">
            <div class="hud-left">
              <span>HUNGER</span>
              <span class="icon-box"><img class="heart-icon" width="12" height="12"
                  src="https://img.icons8.com/officexs/16/undertale-heart.png" alt="heart" /></span>
              <span class="icon-box"><img class="heart-icon" width="12" height="12"
                  src="https://img.icons8.com/officexs/16/undertale-heart.png" alt="heart" /></span>
              <span class="icon-box"><img class="heart-icon" width="12" height="12"
                  src="https://img.icons8.com/officexs/16/undertale-heart.png" alt="heart" /></span>
              <span class="icon-box"><img class="heart-icon" width="12" height="12"
                  src="https://img.icons8.com/officexs/16/undertale-heart.png" alt="heart" /></span>
            </div>
            <div class="hud-right">18:00</div>
          </div>
          <div class="hud-row">
            <div class="hud-left">
              <span>POOP</span>
              <span class="icon-box"><span class="poop-icon">💩</span></span>
              <span class="icon-box"><span class="poop-icon">💩</span></span>
              <span class="icon-box"><span class="poop-icon">💩</span></span>
              <span class="icon-box"><span class="poop-icon">💩</span></span>
            </div>
            <div class="hud-right"></div>
          </div>
        </div>

        <div class="stage" id="stage">
          <div class="sky"></div>
          <div class="clouds">
            <img src="https://img.icons8.com/office/40/cloud.png" alt="cloud" />
            <img src="https://img.icons8.com/office/40/cloud.png" alt="cloud" />
            <img src="https://img.icons8.com/office/40/cloud.png" alt="cloud" />
          </div>
          <div class="grass"></div>
          <div class="tree">
            <img src="assets/tree-branch.png" alt="">
          </div>
          <div class="tunnel" id="tunnel">
            <img src="assets/pipe.png" alt="pipe">
          </div>
          <canvas id="birdCanvas" width="32" height="32"></canvas>
          <canvas id="scooperCanvas" width="32" height="32"></canvas>
          <div id="poopContainer"></div>

        </div>
      </div>

      <img class="device-frame" src="./assets/device-no-lcd.png" alt="device frame" />
    </div>

    <p class="hint">Press Space (or tap) to drop.</p>
  </main>

</body>

</html>
